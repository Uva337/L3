version: '3.8'

services:
  # 1. База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: notification_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"
    restart: unless-stopped

  # 2. Очередь сообщений RabbitMQ (с плагином management для красивой админки)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: notification_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Порт для подключения нашего Go-кода
      - "15672:15672" # Порт для веб-интерфейса (админки)
    restart: unless-stopped

  # 3. Кэш Redis (пригодится нам позже для быстрой отдачи статусов)
  redis:
    image: redis:7-alpine
    container_name: notification_redis
    ports:
      - "6379:6379"
    restart: unless-stopped