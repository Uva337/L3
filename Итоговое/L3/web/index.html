<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Notification UI</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>

    <style>
        :root {
            --primary: #6c5ce7; --background: #fdfdfd; --card-bg: #ffffff;
            --text: #2d3436; --border: #dfe6e9; --success: #00b894; --danger: #d63031;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--background); color: var(--text); padding: 30px; margin: 0; }
        .main-title { text-align: center; color: var(--primary); margin-bottom: 30px; font-size: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { margin-top: 0; font-size: 1.2rem; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .count-badge { background: #e0dbff; color: var(--primary); padding: 2px 10px; border-radius: 20px; font-size: 0.9rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; background: var(--primary); transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Стили для карточек задач */
        .task-list { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .task-card { border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 12px; background: #fafafa; }
        .task-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .task-id { font-size: 0.75rem; color: #636e72; background: #eee; padding: 3px 6px; border-radius: 4px; font-family: monospace; }
        .status-badge { font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 12px; text-transform: uppercase; }
        .status-pending { background: #ffeaa7; color: #d35400; }
        .status-sent { background: #55efc4; color: #00b894; }
        .status-canceled { background: #fab1a0; color: #d63031; }
        .task-message { font-size: 1rem; margin: 0 0 15px 0; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-small { padding: 8px; font-size: 0.85rem; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: #f1f2f6; }
        .btn-danger { background: #ffeaa7; color: #d63031; border: 1px solid #fab1a0; background: white; }
        .empty-state { text-align: center; color: #b2bec3; padding: 40px 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    
    <h1 class="main-title">⚛️ React Дашборд Уведомлений</h1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // Состояние (State) нашего приложения
            const [tasks, setTasks] = useState([]); 
            const [isLoading, setIsLoading] = useState(false);
            
            const [message, setMessage] = useState('Проверка React! 🚀');
            const [recipient, setRecipient] = useState('');
            const [channel, setChannel] = useState('telegram');
            const [scheduledAt, setScheduledAt] = useState('');

            // Создание задачи
            const handleCreate = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    const isoDate = new Date(scheduledAt).toISOString();
                    const res = await fetch('/notify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message, recipient, channel, scheduled_at: isoDate })
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        // Магия React: мы просто добавляем задачу в массив, а React сам перерисует экран
                        setTasks(prev => [{ ...data, status: 'pending' }, ...prev]);
                    } else {
                        alert('Ошибка: ' + data.error);
                    }
                } catch (err) {
                    alert('Ошибка запроса: ' + err.message);
                }
                setIsLoading(false);
            };

            // Обновление статуса
            const handleCheckStatus = async (id) => {
                try {
                    const res = await fetch(`/notify/${id}`);
                    const data = await res.json();
                    if (res.ok) {
                        // Магия React: обновляем статус конкретной задачи в массиве
                        setTasks(prev => prev.map(t => t.id === id ? data : t));
                    }
                } catch (err) {}
            };

            // Отмена задачи
            const handleCancel = async (id) => {
                try {
                    const res = await fetch(`/notify/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        setTasks(prev => prev.map(t => t.id === id ? { ...t, status: 'canceled' } : t));
                    }
                } catch (err) {}
            };

            return (
                <div className="container">
                    
                    {/* ЛЕВАЯ КОЛОНКА */}
                    <div className="col card">
                        <h2>Создать задачу</h2>
                        <form onSubmit={handleCreate}>
                            <label>Текст:</label>
                            <input value={message} onChange={e => setMessage(e.target.value)} required />
                            
                            <label>Получатель (ID):</label>
                            <input value={recipient} onChange={e => setRecipient(e.target.value)} required />
                            
                            <label>Канал связи:</label>
                            <select value={channel} onChange={e => setChannel(e.target.value)}>
                                <option value="telegram">Telegram</option>
                                <option value="email">Email</option>
                            </select>
                            
                            <label>Время отправки:</label>
                            <input type="datetime-local" value={scheduledAt} onChange={e => setScheduledAt(e.target.value)} required />
                            
                            <button disabled={isLoading}>
                                {isLoading ? 'Отправка...' : 'Отправить задачу'}
                            </button>
                        </form>
                    </div>

                    {/* ПРАВАЯ КОЛОНКА */}
                    <div className="col card">
                        <h2>
                            История задач
                            <span className="count-badge">{tasks.length}</span>
                        </h2>
                        
                        <div className="task-list">
                            {tasks.length === 0 ? (
                                <div className="empty-state">
                                    <div style={{fontSize: '3rem', marginBottom: '10px'}}>📭</div>
                                    Пока пусто. Создайте первую задачу!
                                </div>
                            ) : (
                                tasks.map(task => (
                                    <div key={task.id} className="task-card">
                                        <div className="task-header">
                                            <span className="task-id">ID: {task.id.split('-')[0]}...</span>
                                            <span className={`status-badge status-${task.status}`}>
                                                {task.status}
                                            </span>
                                        </div>
                                        <p className="task-message"><strong>{task.message}</strong></p>
                                        
                                        <div className="btn-group">
                                            <button type="button" className="btn-small btn-outline" onClick={() => handleCheckStatus(task.id)}>
                                                🔄 Обновить
                                            </button>
                                            {task.status === 'pending' && (
                                                <button type="button" className="btn-small btn-danger" onClick={() => handleCancel(task.id)}>
                                                    ❌ Отменить
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
